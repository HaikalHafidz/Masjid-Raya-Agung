<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proses Donasi - Masjid Raya Agung</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0d2d1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        
        .message-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        .success-icon {
            color: #27ae60;
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .error-icon {
            color: #e74c3c;
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        h2 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        
        p {
            color: #6c757d;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .btn {
            background: #1a472a;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: #0d2d1a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .donation-detail {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            text-align: left;
        }
        
        .donation-detail p {
            margin: 0.5rem 0;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="message-container" id="messageContainer">
        <!-- Pesan akan diisi oleh JavaScript -->
    </div>

    <script>
        // Ambil data donasi dari sessionStorage
        const donasiData = JSON.parse(sessionStorage.getItem('tempDonasi'));
        const verifData = JSON.parse(sessionStorage.getItem('tempVerifikasi'));
        
        const container = document.getElementById('messageContainer');
        
        if (donasiData && verifData) {
            // Simpan ke localStorage
            let donasiList = JSON.parse(localStorage.getItem('donasiData')) || [];
            
            const donasiBaru = {
                id: Date.now(),
                nama: verifData.nama,
                email: verifData.email,
                tipe: donasiData.tipe,
                detail: donasiData.detail,
                metodeVerif: verifData.metode,
                noTelepon: verifData.noTelepon,
                timestamp: new Date().toLocaleString('id-ID'),
                status: 'Menunggu Konfirmasi'
            };
            
            donasiList.push(donasiBaru);
            localStorage.setItem('donasiData', JSON.stringify(donasiList));
            
            // Hapus data sementara
            sessionStorage.removeItem('tempDonasi');
            sessionStorage.removeItem('tempVerifikasi');
            
            // Tampilkan pesan sukses
            container.innerHTML = `
                <div class="success-icon">✓</div>
                <h2>Donasi Berhasil!</h2>
                <p>Terima kasih ${verifData.nama} atas donasi Anda.</p>
                <div class="donation-detail">
                    <p><strong>Jenis Donasi:</strong> ${donasiData.tipe}</p>
                    <p><strong>Detail:</strong> ${donasiData.detail}</p>
                    <p><strong>Metode Verifikasi:</strong> ${verifData.metode}</p>
                </div>
                <p>Donasi Anda sedang diproses. Kami akan mengirimkan konfirmasi melalui ${verifData.metode === 'otp' ? 'WhatsApp' : 'email'}.</p>
                <a href="../index.html" class="btn">Kembali ke Beranda</a>
                <div class="countdown">Dialihkan dalam <span id="countdown">5</span> detik...</div>
            `;
        } else {
            // Tampilkan pesan error
            container.innerHTML = `
                <div class="error-icon">✗</div>
                <h2>Donasi Gagal!</h2>
                <p>Terjadi kesalahan saat memproses donasi. Silakan coba lagi.</p>
                <a href="../index.html" class="btn">Kembali ke Beranda</a>
                <div class="countdown">Dialihkan dalam <span id="countdown">5</span> detik...</div>
            `;
        }
        
        // Countdown dan redirect
        let countdown = 5;
        const countdownEl = document.getElementById('countdown');
        const interval = setInterval(() => {
            countdown--;
            if (countdownEl) countdownEl.textContent = countdown;
            if (countdown <= 0) {
                clearInterval(interval);
                window.location.href = '../index.html';
            }
        }, 1000);
    </script>
</body>
</html>
