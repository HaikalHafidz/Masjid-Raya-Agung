<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Jadwal Sholat - Masjid Raya Agung</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #1a472a;
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .jadwal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        .jadwal-card {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-left: 4px solid #1a472a;
        }
        
        .jadwal-card h3 {
            color: #1a472a;
            margin-top: 0;
            margin-bottom: 1rem;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 0.5rem;
        }
        
        .jadwal-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            padding: 0.3rem 0;
        }
        
        .jadwal-item .nama {
            font-weight: 600;
            color: #2c3e50;
        }
        
        .jadwal-item .waktu {
            color: #1a472a;
            font-weight: 500;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
            color: #6c757d;
        }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1a472a;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .refresh-btn {
            background: #1a472a;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        
        .refresh-btn:hover {
            background: #0d2d1a;
        }
        
        .last-update {
            text-align: center;
            color: #6c757d;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-clock"></i> Jadwal Sholat Masjid Raya Agung</h1>
        
        <div style="text-align: center;">
            <button class="refresh-btn" onclick="loadJadwal()">
                <i class="fas fa-sync-alt"></i> Refresh Jadwal
            </button>
        </div>
        
        <div id="jadwalContainer" class="jadwal-grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Memuat jadwal sholat...</p>
            </div>
        </div>
        
        <div class="last-update" id="lastUpdate"></div>
    </div>

    <script>
        // Data jadwal sholat default
        const defaultJadwal = [
            {
                kota: 'Jakarta',
                tanggal: new Date().toLocaleDateString('id-ID'),
                sholat: [
                    { nama: 'Imsak', waktu: '04:20' },
                    { nama: 'Subuh', waktu: '04:30' },
                    { nama: 'Terbit', waktu: '05:45' },
                    { nama: 'Dhuha', waktu: '06:15' },
                    { nama: 'Dzuhur', waktu: '11:50' },
                    { nama: 'Ashar', waktu: '15:10' },
                    { nama: 'Maghrib', waktu: '17:50' },
                    { nama: 'Isya', waktu: '19:05' }
                ]
            },
            {
                kota: 'Bandung',
                tanggal: new Date().toLocaleDateString('id-ID'),
                sholat: [
                    { nama: 'Imsak', waktu: '04:25' },
                    { nama: 'Subuh', waktu: '04:35' },
                    { nama: 'Terbit', waktu: '05:50' },
                    { nama: 'Dhuha', waktu: '06:20' },
                    { nama: 'Dzuhur', waktu: '11:55' },
                    { nama: 'Ashar', waktu: '15:15' },
                    { nama: 'Maghrib', waktu: '17:55' },
                    { nama: 'Isya', waktu: '19:10' }
                ]
            },
            {
                kota: 'Surabaya',
                tanggal: new Date().toLocaleDateString('id-ID'),
                sholat: [
                    { nama: 'Imsak', waktu: '04:15' },
                    { nama: 'Subuh', waktu: '04:25' },
                    { nama: 'Terbit', waktu: '05:40' },
                    { nama: 'Dhuha', waktu: '06:10' },
                    { nama: 'Dzuhur', waktu: '11:45' },
                    { nama: 'Ashar', waktu: '15:05' },
                    { nama: 'Maghrib', waktu: '17:45' },
                    { nama: 'Isya', waktu: '19:00' }
                ]
            }
        ];

        // Load jadwal dari localStorage atau API
        function loadJadwal() {
            const container = document.getElementById('jadwalContainer');
            const lastUpdate = document.getElementById('lastUpdate');
            
            // Tampilkan loading
            container.innerHTML = `
                <div class="loading" style="grid-column: 1/-1;">
                    <div class="loading-spinner"></div>
                    <p>Memuat jadwal sholat...</p>
                </div>
            `;
            
            // Simulasi loading (ganti dengan API call jika ada)
            setTimeout(() => {
                // Coba ambil dari localStorage
                let jadwal = JSON.parse(localStorage.getItem('jadwalSholat'));
                
                // Jika tidak ada, gunakan default
                if (!jadwal) {
                    jadwal = defaultJadwal;
                    localStorage.setItem('jadwalSholat', JSON.stringify(jadwal));
                }
                
                // Tampilkan jadwal
                displayJadwal(jadwal);
                
                // Update waktu
                lastUpdate.textContent = `Terakhir diperbarui: ${new Date().toLocaleString('id-ID')}`;
            }, 1000);
        }

        // Tampilkan jadwal
        function displayJadwal(jadwal) {
            const container = document.getElementById('jadwalContainer');
            
            container.innerHTML = jadwal.map(kota => `
                <div class="jadwal-card">
                    <h3>
                        <i class="fas fa-map-marker-alt"></i> ${kota.kota}
                        <small style="display: block; font-size: 0.8rem; color: #6c757d;">${kota.tanggal}</small>
                    </h3>
                    ${kota.sholat.map(s => `
                        <div class="jadwal-item">
                            <span class="nama">${s.nama}</span>
                            <span class="waktu">${s.waktu}</span>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        // Fungsi untuk mengambil jadwal dari API (jika ada)
        async function fetchJadwalFromAPI() {
            try {
                // Contoh: menggunakan API MyQuran
                const response = await fetch('https://api.myquran.com/v2/sholat/jadwal/1630/2025/03/10');
                const data = await response.json();
                
                if (data.status) {
                    // Proses data dari API
                    const jadwalAPI = [{
                        kota: 'Jakarta',
                        tanggal: data.data.tanggal,
                        sholat: [
                            { nama: 'Imsak', waktu: data.data.jadwal.imsak },
                            { nama: 'Subuh', waktu: data.data.jadwal.subuh },
                            { nama: 'Terbit', waktu: data.data.jadwal.terbit },
                            { nama: 'Dhuha', waktu: data.data.jadwal.dhuha },
                            { nama: 'Dzuhur', waktu: data.data.jadwal.dzuhur },
                            { nama: 'Ashar', waktu: data.data.jadwal.ashar },
                            { nama: 'Maghrib', waktu: data.data.jadwal.maghrib },
                            { nama: 'Isya', waktu: data.data.jadwal.isya }
                        ]
                    }];
                    
                    localStorage.setItem('jadwalSholat', JSON.stringify(jadwalAPI));
                    displayJadwal(jadwalAPI);
                }
            } catch (error) {
                console.log('Gagal mengambil data dari API, menggunakan data default');
                loadJadwal();
            }
        }

        // Load jadwal saat halaman dimuat
        document.addEventListener('DOMContentLoaded', loadJadwal);

        // Auto refresh setiap jam
        setInterval(loadJadwal, 3600000);
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
